# Supabase local configuration. See https://supabase.com/docs/guides/local-development
project_id = "re-sales-platform"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[auth.mfa]
max_enrolled_factors = 10

[storage]
enabled = true
file_size_limit = "50MiB"

[db.seed]
enabled = true
sql_paths = ["./seed/seed.sql"]
